version: 1
AppDir:
  path: ./AppDir
  app_info:
    id: org.icesculpt.IceSculpt
    name: IceSculpt
    icon: icesculpt
    version: 0.1.0
    exec: usr/bin/python3
    exec_args: "$APPDIR/usr/bin/icesculpt $@"
  apt:
    arch:
      - amd64
      - arm64
    sources:
      - sourceline: deb http://archive.ubuntu.com/ubuntu/ jammy main restricted universe multiverse
    include:
      - python3
      - python3-gi
      - python3-gi-cairo
      - gir1.2-gtk-3.0
      - libgirepository-1.0-1
      - libcairo2
  runtime:
    env:
      PYTHONHOME: '${APPDIR}/usr'
      PYTHONPATH: '${APPDIR}/usr/lib/python3.10/site-packages'

AppImage:
  arch: x86_64
  update-information: None
  sign-key: None

script:
  - export DESTDIR=$TARGET_APPDIR
  - python3 -m pip install --ignore-installed --prefix=/usr --root=$DESTDIR .
  - mkdir -p $TARGET_APPDIR/usr/bin
  - cp icesculpt $TARGET_APPDIR/usr/bin/
