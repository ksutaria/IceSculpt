version: 1
AppDir:
  path: ./AppDir
  app_info:
    id: org.icesculpt.IceSculpt
    name: IceSculpt
    icon: icesculpt
    version: 0.1.0
    exec: usr/bin/python3
    exec_args: "$APPDIR/usr/bin/icesculpt $@"
  apt:
    arch:
      - amd64
    sources:
      - sourceline: deb [arch=amd64] http://archive.ubuntu.com/ubuntu/ jammy main restricted universe multiverse
        key_url: http://keyserver.ubuntu.com/pks/lookup?op=get&search=0x871920D1991BC93C
      - sourceline: deb [arch=amd64] http://archive.ubuntu.com/ubuntu/ jammy-updates main restricted universe multiverse
        key_url: http://keyserver.ubuntu.com/pks/lookup?op=get&search=0x871920D1991BC93C
      - sourceline: deb [arch=amd64] http://security.ubuntu.com/ubuntu/ jammy-security main restricted universe multiverse
        key_url: http://keyserver.ubuntu.com/pks/lookup?op=get&search=0x871920D1991BC93C
    include:
      - python3
      - python3-gi
      - python3-gi-cairo
      - gir1.2-gtk-3.0
      - libgtk-3-dev
      - libgirepository-1.0-1
      - libcairo2
  runtime:
    env:
      PYTHONHOME: '${APPDIR}/usr'
      PYTHONPATH: '${APPDIR}/usr/lib/python3.10/site-packages'

AppImage:
  arch: x86_64
  update-information: None
  sign-key: None

script:
  - export DESTDIR=$TARGET_APPDIR
  - apt-get update || true
  - apt-get install -y gnupg
  - gpg --keyserver keyserver.ubuntu.com --recv-keys 871920D1991BC93C 3B4FE6ACC0B21F32 || true
  - gpg --export 871920D1991BC93C | apt-key add - || true
  - gpg --export 3B4FE6ACC0B21F32 | apt-key add - || true
  - mkdir -p $DESTDIR/usr/lib/python3.10/site-packages
  - cp -r icesculpt $DESTDIR/usr/lib/python3.10/site-packages/
  - mkdir -p $DESTDIR/usr/bin
  - cp icesculpt/icestudio-launcher $DESTDIR/usr/bin/icesculpt
  - chmod +x $DESTDIR/usr/bin/icesculpt
  - mkdir -p $DESTDIR/usr/share/icons/hicolor/scalable/apps
  - cp icesculpt/data/icons/icesculpt.svg $DESTDIR/usr/share/icons/hicolor/scalable/apps/icesculpt.svg
