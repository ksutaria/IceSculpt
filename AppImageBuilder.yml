version: 1
AppDir:
  path: ./AppDir
  app_info:
    id: org.icesculpt.IceSculpt
    name: IceSculpt
    icon: icesculpt
    exec: usr/bin/icesculpt
    exec_args: "$@"
  apt:
    arch:
      - amd64
      - arm64
    sources:
      - sourceline: deb http://archive.ubuntu.com/ubuntu/ jammy main restricted universe multiverse
    include:
      - python3
      - python3-gi
      - python3-gi-cairo
      - gir1.2-gtk-3.0
      - libgirepository-1.0-1
      - libcairo2
  python:
    version: 3.10
    scan_src:
      - icesculpt
    install:
      - .
  runtime:
    env:
      PATH: '${APPDIR}/usr/bin:${PATH}'
      PYTHONPATH: '${APPDIR}/usr/lib/python3.10/site-packages:${PYTHONPATH}'

AppImage:
  arch: x86_64
  update-information: None
  sign-key: None
