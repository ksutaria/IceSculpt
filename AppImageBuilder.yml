version: 1
AppDir:
  path: ./AppDir
  app_info:
    id: org.icesculpt.IceSculpt
    name: IceSculpt
    icon: icesculpt
    version: 0.1.0
    exec: usr/bin/python3
    exec_args: "$APPDIR/usr/bin/icesculpt $@"
  apt:
    arch: amd64
    sources:
      - sourceline: deb [arch=amd64] http://archive.ubuntu.com/ubuntu/ jammy main restricted universe multiverse
    include:
      - python3
      - python3-gi
      - python3-gi-cairo
      - gir1.2-gtk-3.0
      - libgtk-3-0
  runtime:
    env:
      PYTHONPATH: '${APPDIR}/usr/lib/python3.10/site-packages'

AppImage:
  arch: x86_64

script:
  - mkdir -p $TARGET_APPDIR/usr/lib/python3.10/site-packages
  - cp -r icesculpt $TARGET_APPDIR/usr/lib/python3.10/site-packages/
  - mkdir -p $TARGET_APPDIR/usr/bin
  - cp icesculpt/icesculpt-launcher $TARGET_APPDIR/usr/bin/icesculpt
  - chmod +x $TARGET_APPDIR/usr/bin/icesculpt
