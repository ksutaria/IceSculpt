name: Build and Package

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  # 0. Static Analysis (Linter)
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Install Ruff
        run: pip install ruff
      - name: Run Ruff
        run: ruff check .

  # 1. Unit Tests & Coverage
  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgirepository1.0-dev libcairo2-dev pkg-config \
                           python3-dev gir1.2-gtk-3.0 python3-gi python3-gi-cairo xvfb
      - name: Install python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov ruff
          pip install --no-deps -e .
      - name: Run tests with coverage
        run: |
          xvfb-run pytest --cov=icesculpt --cov-report=xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml

  # 2. Build Python Wheels
  build-wheels:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgirepository1.0-dev libcairo2-dev pkg-config \
                           python3-dev gir1.2-gtk-3.0 python3-gi python3-build
      - name: Build wheel and sdist
        run: python3 -m build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/*

  # 3. Build AppImage
  build-appimage:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-gi python3-gi-cairo gir1.2-gtk-3.0 wget libfuse2
      - name: Build AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
          ARCH: ${{ matrix.arch }}
        run: |
          # Download linuxdeploy
          # For aarch64 we need the aarch64 version of linuxdeploy
          LD_ARCH=${{ matrix.arch }}
          wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-$LD_ARCH.AppImage
          chmod +x linuxdeploy-$LD_ARCH.AppImage
          
          # Download python plugin
          wget https://github.com/linuxdeploy/linuxdeploy-plugin-python/releases/download/continuous/linuxdeploy-plugin-python-$LD_ARCH.AppImage
          chmod +x linuxdeploy-plugin-python-$LD_ARCH.AppImage
          
          # Setup AppDir
          mkdir -p AppDir/usr/bin
          cp icesculpt/icesculpt-launcher AppDir/usr/bin/icesculpt
          chmod +x AppDir/usr/bin/icesculpt
          
          mkdir -p AppDir/usr/share/icons/hicolor/scalable/apps
          cp icesculpt/data/icons/icesculpt.svg AppDir/usr/share/icons/hicolor/scalable/apps/icesculpt.svg
          
          mkdir -p AppDir/usr/share/applications
          cat > AppDir/usr/share/applications/org.icesculpt.IceSculpt.desktop <<EOF
[Desktop Entry]
Type=Application
Name=IceSculpt
Exec=icesculpt
Icon=icesculpt
Categories=Utility;Settings;
EOF
          
          export VERSION=0.1.0
          export PIP_REQUIREMENTS="."
          ./linuxdeploy-$LD_ARCH.AppImage --appdir AppDir --plugin python --output appimage
          
          # Rename to lowercase extension
          mv IceSculpt-*.AppImage icesculpt-0.1.0-$LD_ARCH.appimage
          
      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: IceSculpt-${{ matrix.arch }}.appimage
          path: ./*.appimage

  # 4. Build Flatpak (Sandboxed)
  build-flatpak:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: IceSculpt.flatpak
          manifest-path: org.icesculpt.IceSculpt.yml
          stop-at-module: icesculpt
      - name: Upload Flatpak
        uses: actions/upload-artifact@v4
        with:
          name: IceSculpt.flatpak
          path: IceSculpt.flatpak

  # 5. Release (on Tags)
  release:
    needs: [build-wheels, build-appimage, build-flatpak]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/python-package/*
            release-artifacts/IceSculpt-x86_64.appimage/*
            release-artifacts/IceSculpt-aarch64.appimage/*
            release-artifacts/IceSculpt.flatpak/*
          generate_release_notes: true
          draft: false
          prerelease: false
