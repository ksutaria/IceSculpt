name: Build and Package

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  # 0. Static Analysis (Linter)
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Install Ruff
        run: pip install ruff
      - name: Run Ruff
        run: ruff check .

  # 1. Unit Tests & Coverage
  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgirepository1.0-dev libcairo2-dev pkg-config \
                           python3-dev gir1.2-gtk-3.0 python3-gi python3-gi-cairo xvfb
      - name: Install python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov ruff
          pip install --no-deps -e .
      - name: Run tests with coverage
        run: |
          xvfb-run pytest --cov=icesculpt --cov-report=xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml

  # 2. Build Python Wheels
  build-wheels:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgirepository1.0-dev libcairo2-dev pkg-config \
                           python3-dev gir1.2-gtk-3.0 python3-gi python3-build
      - name: Build wheel and sdist
        run: python3 -m build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/*

  # 3. Build AppImage
  build-appimage:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        if: matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3
      - name: Prepare Recipe
        run: |
          # Map matrix arch to debian arch
          DEB_ARCH=${{ matrix.arch }}
          if [ "$DEB_ARCH" = "x86_64" ]; then DEB_ARCH="amd64"; fi
          if [ "$DEB_ARCH" = "aarch64" ]; then DEB_ARCH="arm64"; fi
          
          sed -i "s/{{ ARCH }}/$DEB_ARCH/g" AppImageBuilder.yml
      - name: Build AppImage
        uses: docker://appimagecrafters/appimage-builder:latest
        with:
          entrypoint: /bin/bash
          args: -c "appimage-builder --recipe AppImageBuilder.yml --skip-test"
      - name: Rename and Verify AppImage
        run: |
          # The builder usually outputs something like IceSculpt-0.1.0-x86_64.AppImage
          # We want IceSculpt-0.1.0-x86_64.appimage
          for f in *.AppImage; do
            mv "$f" "${f%.AppImage}.appimage"
          done
          ls -l *.appimage
      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: IceSculpt-${{ matrix.arch }}.appimage
          path: ./*.appimage

  # 4. Build Flatpak (Sandboxed)
  build-flatpak:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: IceSculpt.flatpak
          manifest-path: org.icesculpt.IceSculpt.yml
          stop-at-module: icesculpt
      - name: Upload Flatpak
        uses: actions/upload-artifact@v4
        with:
          name: IceSculpt.flatpak
          path: IceSculpt.flatpak

  # 5. Release (on Tags)
  release:
    needs: [build-wheels, build-appimage, build-flatpak]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/python-package/*
            release-artifacts/IceSculpt-x86_64.appimage/*
            release-artifacts/IceSculpt-aarch64.appimage/*
            release-artifacts/IceSculpt.flatpak/*
          generate_release_notes: true
          draft: false
          prerelease: false
