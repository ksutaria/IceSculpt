name: Build and Package

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  # 0. Run Tests and Coverage
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y libgirepository1.0-dev libcairo2-dev pkg-config \
                             gir1.2-gtk-3.0 python3-gi python3-gi-cairo xvfb \
                             build-essential libdbus-1-dev
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install wheel
          python -m pip install pytest pytest-cov PyGObject pycairo
          python -m pip install -e .[test]
      - name: Run tests with coverage
        run: |
          xvfb-run pytest --cov=icesculpt --cov-report=xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          fail_ci_if_error: false

  # 1. Build Python Wheels (Standard Distribution)
  build-wheels:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y libgirepository1.0-dev libcairo2-dev pkg-config \
                             gir1.2-gtk-3.0 python3-gi python3-gi-cairo
      - name: Install build dependencies
        run: pip install build
      - name: Build wheel and sdist
        run: python -m build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/

  # 2. Build AppImage (Standalone Binary)
  # Supports x86_64 and aarch64 via QEMU
  build-appimage:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        if: matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3
      - name: Build AppImage
        uses: AppImageCommunity/appimage-builder-action@v1
        with:
          recipe: AppImageBuilder.yml
          arch: ${{ matrix.arch }}
      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: IceSculpt-${{ matrix.arch }}.AppImage
          path: ./*.AppImage

  # 3. Build Flatpak (Sandboxed)
  build-flatpak:
    needs: test
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:freedesktop-23.08
    steps:
      - uses: actions/checkout@v4
      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v1
        with:
          bundle: IceSculpt.flatpak
          manifest-path: org.icesculpt.IceSculpt.yml
          stop-at-module: icesculpt
