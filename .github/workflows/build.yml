name: Build and Package

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  # 0. Run Tests and Coverage
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y libgirepository1.0-dev libcairo2-dev pkg-config \
                             gir1.2-gtk-3.0 python3-gi python3-gi-cairo xvfb \
                             build-essential libdbus-1-dev
      - name: Set PKG_CONFIG_PATH
        run: |
          echo "PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/lib/pkgconfig:/usr/share/pkgconfig:$(python -c "import sysconfig; print(sysconfig.get_config_var('LIBDIR'))")/pkgconfig" >> $GITHUB_ENV
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install wheel pytest pytest-cov
          python -m pip install "PyGObject<3.50" pycairo
          python -m pip install -e .[test]
      - name: Run tests with coverage
        run: |
          xvfb-run pytest --cov=icesculpt --cov-report=xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # 1. Build Python Wheels (Standard Distribution)
  build-wheels:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Set PKG_CONFIG_PATH
        run: |
          echo "PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/lib/pkgconfig:/usr/share/pkgconfig:$(python -c "import sysconfig; print(sysconfig.get_config_var('LIBDIR'))")/pkgconfig" >> $GITHUB_ENV
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y libgirepository1.0-dev libcairo2-dev pkg-config \
                             gir1.2-gtk-3.0 python3-gi python3-gi-cairo
      - name: Install build dependencies
        run: |
          pip install build
          pip install "PyGObject<3.50" pycairo
      - name: Build wheel and sdist
        run: |
          python -m build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/

