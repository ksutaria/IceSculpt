name: Build and Package

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  # 0. Static Analysis (Linter)
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Ruff
        run: pip install ruff
      - name: Run Ruff
        run: ruff check .

  # 1. Unit Tests & Coverage
  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgirepository1.0-dev libcairo2-dev pkg-config \
                           python3-dev gir1.2-gtk-3.0 python3-gi python3-gi-cairo xvfb
      - name: Set PKG_CONFIG_PATH
        run: echo "PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig" >> $GITHUB_ENV
      - name: Install dependencies
        run: |
          sudo apt-get install -y python3-pytest python3-pytest-cov ruff
          # Install current package in editable mode without trying to rebuild dependencies
          pip install --no-deps -e .
      - name: Run tests with coverage
        run: |
          xvfb-run pytest --cov=icesculpt --cov-report=xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml

  # 2. Build Python Wheels
  build-wheels:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Set PKG_CONFIG_PATH
        run: |
          sudo apt-get update
          sudo apt-get install -y libgirepository1.0-dev libcairo2-dev pkg-config
          echo "PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig" >> $GITHUB_ENV
      - name: Install system dependencies
        run: sudo apt-get install -y gir1.2-gtk-3.0 python3-gi python3-build
      - name: Build wheel and sdist
        run: python3 -m build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/*

  # 3. Build Flatpak (Sandboxed)
  build-flatpak:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: IceSculpt.flatpak
          manifest-path: org.icesculpt.IceSculpt.yml
          stop-at-module: icesculpt
      - name: Upload Flatpak
        uses: actions/upload-artifact@v4
        with:
          name: IceSculpt.flatpak
          path: IceSculpt.flatpak

  # 4. Release (on Tags)
  release:
    needs: [build-wheels, build-flatpak]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/python-package/*
            release-artifacts/IceSculpt.flatpak/*
          generate_release_notes: true
          draft: false
          prerelease: false
