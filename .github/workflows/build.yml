name: Build and Package

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  # 0. Static Analysis (Linter)
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Ruff
        run: pip install ruff
      - name: Run Ruff
        run: ruff check .

  # 1. Run Tests and Coverage
  test:
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y libgirepository1.0-dev libcairo2-dev pkg-config \
                             gir1.2-gtk-3.0 python3-gi python3-gi-cairo xvfb \
                             build-essential libdbus-1-dev
      - name: Set PKG_CONFIG_PATH
        run: |
          echo "PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/lib/pkgconfig:/usr/share/pkgconfig:$(python -c "import sysconfig; print(sysconfig.get_config_var('LIBDIR'))")/pkgconfig" >> $GITHUB_ENV
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install wheel pytest pytest-cov
          python -m pip install "PyGObject<3.50" pycairo
          python -m pip install -e .[test]
      - name: Run tests with coverage
        run: |
          xvfb-run pytest --cov=icesculpt --cov-report=xml --cov-report=term
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # 1. Build Python Wheels (Standard Distribution)
  build-wheels:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Set PKG_CONFIG_PATH
        run: |
          echo "PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/lib/pkgconfig:/usr/share/pkgconfig:$(python -c "import sysconfig; print(sysconfig.get_config_var('LIBDIR'))")/pkgconfig" >> $GITHUB_ENV
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y libgirepository1.0-dev libcairo2-dev pkg-config \
                             gir1.2-gtk-3.0 python3-gi python3-gi-cairo
      - name: Install build dependencies
        run: |
          pip install build
          pip install "PyGObject<3.50" pycairo
      - name: Build wheel and sdist
        run: |
          python -m build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/

  # 2. Build AppImage (Standalone Binary)
  build-appimage:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86_64]
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        if: matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3
      - name: Build AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: |
          sudo apt-get update && sudo apt-get install -y libfuse2
          wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget https://github.com/linuxdeploy/linuxdeploy-plugin-python/releases/download/continuous/linuxdeploy-plugin-python-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-python-x86_64.AppImage
          
          # Setup AppDir
          mkdir -p AppDir/usr/bin
          cp icesculpt/icesculpt-launcher AppDir/usr/bin/icesculpt
          chmod +x AppDir/usr/bin/icesculpt
          
          mkdir -p AppDir/usr/share/icons/hicolor/scalable/apps
          cp icesculpt/data/icons/icesculpt.svg AppDir/usr/share/icons/hicolor/scalable/apps/icesculpt.svg
          
          mkdir -p AppDir/usr/share/applications
          cat > AppDir/usr/share/applications/org.icesculpt.IceSculpt.desktop <<EOF
          [Desktop Entry]
          Type=Application
          Name=IceSculpt
          Exec=icesculpt
          Icon=icesculpt
          Categories=Utility;Settings;
          EOF
          
          export VERSION=0.1.0
          export PIP_REQUIREMENTS="."
          ./linuxdeploy-x86_64.AppImage --appdir AppDir --plugin python --output appimage
          
          mv IceSculpt-*.AppImage icesculpt-0.1.0-x86_64.appimage
      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: IceSculpt-${{ matrix.arch }}.appimage
          path: ./*.appimage

  # 3. Build Flatpak (Sandboxed)
  build-flatpak:
    needs: test
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-45
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: IceSculpt.flatpak
          manifest-path: org.icesculpt.IceSculpt.yml
          stop-at-module: icesculpt
      - name: Upload Flatpak
        uses: actions/upload-artifact@v4
        with:
          name: IceSculpt.flatpak
          path: IceSculpt.flatpak

  # 4. Release (on Tags)
  release:
    needs: [build-wheels, build-appimage, build-flatpak]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/python-package/*
            release-artifacts/IceSculpt-x86_64.appimage/*
            release-artifacts/IceSculpt-aarch64.appimage/*
            release-artifacts/IceSculpt.flatpak/*
          generate_release_notes: true
          draft: false
          prerelease: false
