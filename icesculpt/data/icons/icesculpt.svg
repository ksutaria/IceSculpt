<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E0F7FA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4DD0E1;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" />
      <feOffset dx="2" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- The Ice Block -->
  <path d="M40 80 L140 40 L220 80 L220 180 L120 220 L40 180 Z" fill="url(#iceGrad)" stroke="#B2EBF2" stroke-width="2" filter="url(#shadow)" />
  <path d="M40 80 L120 120 L220 80" fill="none" stroke="#FFFFFF" stroke-opacity="0.5" stroke-width="2" />
  <path d="M120 120 L120 220" fill="none" stroke="#FFFFFF" stroke-opacity="0.3" stroke-width="2" />

  <!-- The Chisel -->
  <g transform="translate(160, 140) rotate(-15)">
    <!-- Handle -->
    <rect x="0" y="0" width="12" height="60" rx="4" fill="#8D6E63" />
    <!-- Metal Shaft -->
    <rect x="2" y="60" width="8" height="40" fill="#BDBDBD" />
    <!-- Blade -->
    <path d="M0 100 L12 100 L10 115 L2 115 Z" fill="#E0E0E0" />
    <path d="M2 115 L10 115 L6 120 Z" fill="#9E9E9E" />
  </g>

  <!-- Ice Shards -->
  <path d="M140 190 L150 180 L160 195 Z" fill="#E0F7FA" opacity="0.8" />
  <path d="M100 205 L110 200 L105 215 Z" fill="#E0F7FA" opacity="0.6" />
</svg>
