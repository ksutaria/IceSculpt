<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E0F7FA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#80DEEA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bladeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#CFD8DC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#90A4AE;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Unicorn Silhouette (partially carved) -->
  <g transform="translate(20, 20)">
    <!-- Head and Neck -->
    <path d="M 60,30 C 40,40 30,60 30,80 L 35,110 C 40,120 50,140 65,150 
             L 80,180 L 90,170 C 100,160 110,140 115,120 L 120,90 
             C 110,70 90,50 60,30 Z"
          fill="url(#iceGrad)" stroke="#FFFFFF" stroke-width="1.5" filter="url(#glow)"/>
    <!-- Horn -->
    <path d="M 58,28 L 50,5 L 62,26 Z" fill="#B2EBF2" stroke="#FFFFFF" stroke-width="1"/>
    <!-- Ear -->
    <path d="M 85,45 C 95,40 100,50 95,55 Z" fill="#B2EBF2"/>
  </g>

  <!-- Chainsaw -->
  <g transform="translate(100, 100) rotate(-30)">
    <!-- Body -->
    <rect x="0" y="0" width="80" height="40" rx="5" fill="#F4511E"/>
    <rect x="10" y="-10" width="20" height="15" fill="#BF360C" />
    <!-- Handle -->
    <path d="M 80,10 L 110,10 C 120,10 120,30 110,30 L 80,30 Z" 
          stroke="#455A64" fill="none" stroke-width="8"/>
    <!-- Blade Guide -->
    <path d="M -80,20 Q -70,20 -70,10 L -70,-10 Q -70,-20 -80,-20 L -90,-10 L -90,10 Z" fill="url(#bladeGrad)" transform="rotate(15) translate(80, -10)" />
    <!-- Blade Teeth (simplified) -->
    <text x="-75" y="20" font-family="monospace" font-size="10" fill="#455A64" transform="rotate(15) translate(80, -10)">
      ▲▲▲▲▲▲▲▲▲▲
    </text>
  </g>

  <!-- Ice Shards -->
  <g opacity="0.8">
    <path d="M 120,70 L 130,65 L 125,80 Z" fill="#E0F7FA"/>
    <path d="M 100,150 L 90,155 L 95,140 Z" fill="#B2EBF2"/>
    <path d="M 150,130 L 160,135 L 155,120 Z" fill="#E0F7FA"/>
  </g>
</svg>
