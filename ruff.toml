line-length = 120
target-version = "py38"

[lint]
select = ["F", "E", "W"]
ignore = [
    "E402", # Module level import not at top of file
    "E741", # Ambiguous variable name
    "W293", # Blank line contains whitespace
    "E501", # Line too long
]

[lint.per-file-ignores]
"__init__.py" = ["F401"]
"tests/*" = ["F841"]
