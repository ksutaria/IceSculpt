app-id: org.icesculpt.IceSculpt
runtime: org.gnome.Platform
runtime-version: '45'
sdk: org.gnome.Sdk
command: icesculpt
finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=fallback-x11
  - --device=dri
  - --filesystem=home
  - --talk-name=org.freedesktop.Notifications

modules:
  - name: python3-pycairo
    buildsystem: meson
    sources:
      - type: archive
        url: https://github.com/pygobject/pycairo/releases/download/v1.26.0/pycairo-1.26.0.tar.gz
        sha256: 2dddd0a874fbddb21e14acd9b955881ee1dc6e63b9c549a192d613a907f9cbeb

  - name: python3-pygobject
    buildsystem: meson
    sources:
      - type: archive
        url: https://download.gnome.org/sources/pygobject/3.48/pygobject-3.48.2.tar.xz
        sha256: 0794aeb4a9be31a092ac20621b5f54ec280f9185943d328b105cdae6298ad1a7

  - name: icesculpt
    buildsystem: python
    build-options:
      env:
        PYTHONPATH: /app/lib/python3.12/site-packages
    sources:
      - type: dir
        path: .
